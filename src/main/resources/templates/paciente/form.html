<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Paciente</title>
</head>
<body>
<h2>Registrar paciente</h2>

<form th:action="@{/pacientes/guardar}" th:object="${pacienteForm}" method="post">
    <div>
        <label>Nombre:</label>
        <input type="text" th:field="*{nombre}">
        <span th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
    </div>

    <div>
        <label>DNI:</label>
        <input type="text" th:field="*{dni}">
        <span th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}"></span>
    </div>

    <div>
        <label>Diagnóstico:</label>
        <textarea th:field="*{diagnostico}"></textarea>
        <span th:if="${#fields.hasErrors('diagnostico')}" th:errors="*{diagnostico}"></span>
    </div>

    <button type="submit">Guardar</button>
</form>
</body>
</html>
